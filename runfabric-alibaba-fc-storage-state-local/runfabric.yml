# RunFabric config — generated by runfabric init
# Provider: alibaba-fc — see docs for credentials and trigger support
service: runfabric-alibaba-fc-storage-state-local

provider:
  name: alibaba-fc
  runtime: nodejs20.x
  region: ${env:AWS_REGION,us-east-1}

functions:
  handler:
    handler: dist/handler.handler
    memory: 128
    timeout: 10
    events:
      - storage:
          bucket: my-bucket
          events:
            - s3:ObjectCreated:*
