# RunFabric config — generated by runfabric init
# Provider: aws-lambda — set AWS_REGION; optional backend: s3 + DynamoDB for state
service: runfabric-aws-lambda-http-state-gcs

provider:
  name: aws-lambda
  runtime: nodejs20.x
  region: ${env:AWS_REGION,us-east-1}

backend:
  kind: gcs

functions:
  handler:
    handler: dist/handler.handler
    memory: 128
    timeout: 10
    events:
      - http:
          path: /hello
          method: get
