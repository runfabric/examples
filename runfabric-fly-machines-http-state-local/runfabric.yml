# RunFabric config — generated by runfabric init
# Provider: fly-machines — set FLY_*; http only
service: runfabric-fly-machines-http-state-local

provider:
  name: fly-machines
  runtime: nodejs20.x
  region: ${env:AWS_REGION,us-east-1}

functions:
  handler:
    handler: dist/handler.handler
    memory: 128
    timeout: 10
    events:
      - http:
          path: /hello
          method: get
