# RunFabric config — generated by runfabric init
# Provider: netlify — set provider token; supports http, cron
service: runfabric-netlify-http-state-local

provider:
  name: netlify
  runtime: nodejs20.x
  region: ${env:AWS_REGION,us-east-1}

functions:
  handler:
    handler: dist/handler.handler
    memory: 128
    timeout: 10
    events:
      - http:
          path: /hello
          method: get
