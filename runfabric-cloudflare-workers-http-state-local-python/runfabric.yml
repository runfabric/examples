# RunFabric config — generated by runfabric init
# Provider: cloudflare-workers — set CLOUDFLARE_*; supports http, cron
service: runfabric-cloudflare-workers-http-state-local-python

provider:
  name: cloudflare-workers
  runtime: python3.11
  region: ${env:AWS_REGION,us-east-1}

functions:
  handler:
    handler: handler.handler
    memory: 128
    timeout: 10
    events:
      - http:
          path: /hello
          method: get
