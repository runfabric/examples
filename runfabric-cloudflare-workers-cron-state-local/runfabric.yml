# RunFabric config — generated by runfabric init
# Provider: cloudflare-workers — set CLOUDFLARE_*; supports http, cron
service: runfabric-cloudflare-workers-cron-state-local

provider:
  name: cloudflare-workers
  runtime: nodejs20.x
  region: ${env:AWS_REGION,us-east-1}

functions:
  handler:
    handler: dist/handler.handler
    memory: 128
    timeout: 10
    events:
      - cron: "rate(5 minutes)"
