# RunFabric config — generated by runfabric init
# Provider: gcp-functions — set GCP_PROJECT_ID; supports http, cron, queue, storage, pubsub
service: runfabric-gcp-functions-http-state-local-go

provider:
  name: gcp-functions
  runtime: go1.x
  region: ${env:AWS_REGION,us-east-1}

functions:
  handler:
    handler: handler
    memory: 128
    timeout: 10
    events:
      - http:
          path: /hello
          method: get
