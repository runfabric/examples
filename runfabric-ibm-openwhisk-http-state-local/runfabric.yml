# RunFabric config — generated by runfabric init
# Provider: ibm-openwhisk — see docs for credentials and trigger support
service: runfabric-ibm-openwhisk-http-state-local

provider:
  name: ibm-openwhisk
  runtime: nodejs20.x
  region: ${env:AWS_REGION,us-east-1}

functions:
  handler:
    handler: dist/handler.handler
    memory: 128
    timeout: 10
    events:
      - http:
          path: /hello
          method: get
