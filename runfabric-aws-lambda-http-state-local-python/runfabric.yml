# RunFabric config — generated by runfabric init
# Provider: aws-lambda — set AWS_REGION; optional backend: s3 + DynamoDB for state
service: runfabric-aws-lambda-http-state-local-python

provider:
  name: aws-lambda
  runtime: python3.11
  region: ${env:AWS_REGION,us-east-1}

functions:
  handler:
    handler: handler.handler
    memory: 128
    timeout: 10
    events:
      - http:
          path: /hello
          method: get
