# RunFabric config — generated by runfabric init
# Provider: azure-functions — set AZURE_*; supports http, cron, queue, storage
service: runfabric-azure-functions-http-state-local-python

provider:
  name: azure-functions
  runtime: python3.11
  region: ${env:AWS_REGION,us-east-1}

functions:
  handler:
    handler: handler.handler
    memory: 128
    timeout: 10
    events:
      - http:
          path: /hello
          method: get
