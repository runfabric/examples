# RunFabric config — generated by runfabric init
# Provider: azure-functions — set AZURE_*; supports http, cron, queue, storage
service: runfabric-azure-functions-queue-state-local

provider:
  name: azure-functions
  runtime: nodejs20.x
  region: ${env:AWS_REGION,us-east-1}

functions:
  handler:
    handler: dist/handler.handler
    memory: 128
    timeout: 10
    events:
      - queue:
          queue: my-queue
