# RunFabric config — generated by runfabric init
# Provider: aws-lambda — set AWS_REGION; optional backend: s3 + DynamoDB for state
service: runfabric-aws-lambda-http-state-s3

provider:
  name: aws-lambda
  runtime: nodejs20.x
  region: ${env:AWS_REGION,us-east-1}

backend:
  kind: s3
  s3Bucket: ${env:RUNFABRIC_S3_BUCKET}
  s3Prefix: runfabric/dev
  lockTable: ${env:RUNFABRIC_DYNAMODB_TABLE}

functions:
  handler:
    handler: dist/handler.handler
    memory: 128
    timeout: 10
    events:
      - http:
          path: /hello
          method: get
