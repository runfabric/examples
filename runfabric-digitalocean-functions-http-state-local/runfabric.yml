# RunFabric config — generated by runfabric init
# Provider: digitalocean-functions — see docs for credentials and trigger support
service: runfabric-digitalocean-functions-http-state-local

provider:
  name: digitalocean-functions
  runtime: nodejs20.x
  region: ${env:AWS_REGION,us-east-1}

functions:
  handler:
    handler: dist/handler.handler
    memory: 128
    timeout: 10
    events:
      - http:
          path: /hello
          method: get
